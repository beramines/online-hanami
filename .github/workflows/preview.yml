name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=online-hanami --branch=${{ github.head_ref }}

      - name: Delete old preview deployments
        uses: actions/github-script@v7
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CURRENT_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const res = await fetch(
              `https://api.cloudflare.com/client/v4/accounts/${process.env.CF_ACCOUNT_ID}/pages/projects/online-hanami/deployments`,
              { headers: { 'Authorization': `Bearer ${process.env.CF_API_TOKEN}` } }
            );
            const { result } = await res.json();
            const currentUrl = process.env.CURRENT_DEPLOYMENT_URL;

            for (const d of result) {
              if (d.deployment_trigger?.metadata?.branch !== branch) continue;
              if (d.url === currentUrl) continue;

              console.log(`Deleting old deployment: ${d.id} (${d.url})`);
              const delRes = await fetch(
                `https://api.cloudflare.com/client/v4/accounts/${process.env.CF_ACCOUNT_ID}/pages/projects/online-hanami/deployments/${d.id}?force=true`,
                { method: 'DELETE', headers: { 'Authorization': `Bearer ${process.env.CF_API_TOKEN}` } }
              );
              const delJson = await delRes.json();
              if (!delJson.success) {
                console.log(`Failed to delete ${d.id}:`, JSON.stringify(delJson.errors));
              }
            }

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            if (!deploymentUrl) {
              console.log('No deployment URL found, skipping comment');
              return;
            }

            const body = `🌸 **Preview deployed!**\n\n${deploymentUrl}\n\n_Updated at ${new Date().toISOString()}_`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed!')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete all preview deployments for branch
        uses: actions/github-script@v7
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const res = await fetch(
              `https://api.cloudflare.com/client/v4/accounts/${process.env.CF_ACCOUNT_ID}/pages/projects/online-hanami/deployments`,
              { headers: { 'Authorization': `Bearer ${process.env.CF_API_TOKEN}` } }
            );
            const { result } = await res.json();

            let deleted = 0;
            for (const d of result) {
              if (d.deployment_trigger?.metadata?.branch !== branch) continue;

              console.log(`Deleting deployment: ${d.id} (${d.url})`);
              const delRes = await fetch(
                `https://api.cloudflare.com/client/v4/accounts/${process.env.CF_ACCOUNT_ID}/pages/projects/online-hanami/deployments/${d.id}?force=true`,
                { method: 'DELETE', headers: { 'Authorization': `Bearer ${process.env.CF_API_TOKEN}` } }
              );
              const delJson = await delRes.json();
              if (delJson.success) {
                deleted++;
              } else {
                console.log(`Failed to delete ${d.id}:`, JSON.stringify(delJson.errors));
              }
            }
            console.log(`Deleted ${deleted} preview deployment(s) for branch: ${branch}`);
